name: Run Automation Tests

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: "11"
        distribution: "temurin"

    # -----------------------------------------
    # RUN WEB AUTOMATION TEST
    # -----------------------------------------
    - name: Run Web Automation Test
      run: |
        cd web-automation
        mvn clean test

    - name: Upload Web Automation Report
      uses: actions/upload-artifact@v3
      with:
        name: web-automation-report
        path: |
          web-automation/target/**/cucumber*.html
          web-automation/target/**/cucumber*/**
          web-automation/target/**/surefire-reports/**
        if-no-files-found: warn

    # -----------------------------------------
    # RUN API AUTOMATION TEST
    # -----------------------------------------
    - name: Run API Automation Test
      run: |
        cd api-automation
        mvn clean test

    - name: Upload API Automation Report
      uses: actions/upload-artifact@v3
      with:
        name: api-automation-report
        path: |
          api-automation/target/**/cucumber*.html
          api-automation/target/**/cucumber*/**
          api-automation/target/**/surefire-reports/**
        if-no-files-found: warn

